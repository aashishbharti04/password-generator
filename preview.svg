<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2027"/>
      <stop offset="0.5" stop-color="#203a43"/>
      <stop offset="1" stop-color="#2c5364"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- glass card -->
  <g filter="url(#shadow)">
    <rect x="415" y="120" width="450" height="400" rx="28"
          fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>

  <text x="640" y="180" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="700">🔐 Password Generator</text>

  <!-- output field -->
  <rect x="445" y="205" width="330" height="48" rx="10" fill="#000000" fill-opacity="0.25"/>
  <text x="465" y="237" fill="#ffffff" font-size="20" font-family="monospace">k7$Rm2!qXz9Lp@Vt</text>
  <rect x="785" y="205" width="48" height="48" rx="10" fill="#ffffff"/>
  <text x="809" y="238" text-anchor="middle" font-size="22">📋</text>

  <!-- options -->
  <text x="445" y="295" fill="#ffffff" font-size="18">Length: 16</text>
  <rect x="560" y="285" width="273" height="6" rx="3" fill="#ffffff" fill-opacity="0.3"/>
  <circle cx="700" cy="288" r="9" fill="#4ade80"/>

  <text x="445" y="335" fill="#ffffff" font-size="17">☑ Uppercase   ☑ Lowercase</text>
  <text x="445" y="365" fill="#ffffff" font-size="17">☑ Numbers     ☑ Symbols</text>

  <!-- generate button -->
  <rect x="445" y="395" width="388" height="50" rx="12" fill="#4ade80"/>
  <text x="640" y="428" text-anchor="middle" fill="#06281b" font-size="20" font-weight="700">Generate</text>

  <text x="640" y="478" text-anchor="middle" fill="#ffffff" fill-opacity="0.85" font-size="17">Strength: Very strong (~105 bits)</text>

  <text x="640" y="575" text-anchor="middle" fill="#ffffff" fill-opacity="0.6" font-size="18">Secure passwords generated 100% in your browser · nothing leaves your device</text>
</svg>
